<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeMusic Server Status</title>

<style>
body {
    background: #0b0f0c;
    color: #eaffea;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00ff88;
}

.server {
    margin: 15px auto;
    padding: 15px;
    width: 90%;
    max-width: 500px;
    border-radius: 10px;
    background: #111;
    box-shadow: 0 0 10px rgba(0,255,136,0.3);
}

.online { color: #00ff88; }
.down { color: #ff4444; }
.checking { color: #ffaa00; }
</style>
</head>

<body>

<h1>🎧 ExeMusic Real Server Status</h1>

<div id="servers"></div>

<script>
// DAFTAR SERVER / HOST
const servers = [
    {
        name: "Top4Top",
        url: "https://a.top4top.io/m_3696vmdi10.mp3"
    },
    {
        name: "Supabase Storage",
        url: "https://rirernnkstrjjquvblge.supabase.co/storage/v1/object/public/music/music_1774614536393_yuzamx.mp3"
    },
    {
        name: "JukeHost",
        url: "https://audio.jukehost.co.uk/xDKw9jLiT3j5ip1NNsE1uAigpM623I29.mp3"
    },
    {
        name: "GitHub Raw",
        url: "https://raw.githubusercontent.com/exemusic/exemusic.github.io/main/index.mp3"
    }
];

// RENDER UI
function renderServers() {
    const container = document.getElementById("servers");
    container.innerHTML = "";

    servers.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "server";
        div.id = "server-" + i;
        div.innerHTML = `
            <b>${s.name}</b><br>
            <span class="checking">Checking...</span>
        `;
        container.appendChild(div);
    });
}

// CHECK SERVER REAL
async function checkServer(server, index) {
    const el = document.getElementById("server-" + index);

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(server.url, {
            method: "HEAD",
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (res.ok) {
            el.innerHTML = `<b>${server.name}</b><br><span class="online">🟢 ONLINE</span>`;
        } else {
            el.innerHTML = `<b>${server.name}</b><br><span class="down">🔴 ERROR ${res.status}</span>`;
        }

    } catch (err) {
        el.innerHTML = `<b>${server.name}</b><br><span class="down">🔴 DOWN</span>`;
    }
}

// RUN CHECK
function runCheck() {
    servers.forEach((s, i) => {
        checkServer(s, i);
    });
}

// INIT
renderServers();
runCheck();

// AUTO REFRESH
setInterval(runCheck, 30000);
</script>

</body>
</html>
