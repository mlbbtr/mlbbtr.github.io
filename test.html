<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Battle Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        
        /* UI Overlay */
        .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #death-screen { display: none; background: rgba(150, 0, 0, 0.9); z-index: 200; text-align: center; }
        
        #hud { position: fixed; top: 10px; left: 10px; z-index: 50; display: none; }
        .stat-box { background: rgba(0,0,0,0.7); padding: 10px; border-left: 4px solid var(--neon-blue); margin-bottom: 5px; border-radius: 0 10px 10px 0; }
        #zone-warning { color: #ff3131; font-weight: bold; display: none; animation: blink 1s infinite; }

        /* Controls */
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon-blue); border-radius: 50%; display: none; z-index: 60; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%); }
        #fire-btn { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,0,255,0.4), rgba(255,0,255,0.05)); border: 4px solid var(--neon-pink); border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 60; font-weight: bold; }
        
        canvas { display: none; background: #000; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1>EXECURIVE ARENA</h1>
        <button id="login-btn" style="padding:15px 30px; background:var(--neon-blue); border:none; font-family:'Orbitron'; cursor:pointer;">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2>LOBBY</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button id="start-btn" style="padding:15px 30px; background:var(--neon-pink); border:none; color:white; font-family:'Orbitron'; cursor:pointer;">DEPLOY (3s)</button>
    </div>

    <div id="death-screen" class="overlay">
        <h1 style="font-size: 60px; margin: 0;">WASTED</h1>
        <p id="killed-by" style="font-size: 20px;">KILLED BY: UNKNOWN</p>
        <h2 id="respawn-timer" style="color:yellow">5</h2>
    </div>

    <div id="hud">
        <div class="stat-box" id="hud-name">PLAYER</div>
        <div class="stat-box" id="hud-score">KILLS: 0 | DEATHS: 0</div>
        <div id="zone-warning">OUTSIDE ZONE! HP -10</div>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, increment, push, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null, players = {}, globalBullets = {}, joystick = { active: false, moveX: 0, moveY: 0 };
        let camera = { x: 0, y: 0 }, keys = {}, lastFireTime = 0;
        let zone = { x: 1000, y: 1000, radius: 800 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                document.getElementById("hud-name").innerText = user.displayName;
                
                set(ref(db, 'players/' + myId), { id: myId, name: user.displayName, x: 1000, y: 1000, color: '#00f3ff', hp: 100, kills: 0, deaths: 0, isAlive: true, lastKiller: "" });
                onDisconnect(ref(db, 'players/' + myId)).remove();
            }
        });

        // Sinkronisasi Data Global
        onValue(ref(db, 'players'), (s) => { players = s.val() || {}; });
        onValue(ref(db, 'bullets'), (s) => { globalBullets = s.val() || {}; });

        // SISTEM TEMBAK GLOBAL
        function fire() {
            const me = players[myId];
            if (!me || !me.isAlive || Date.now() - lastFireTime < 800) return;

            let target = null, minDist = 400;
            Object.values(players).forEach(p => {
                if(p.id !== myId && p.isAlive) {
                    let d = Math.hypot(p.x - me.x, p.y - me.y);
                    if(d < minDist) { minDist = d; target = p; }
                }
            });

            if(target) {
                const angle = Math.atan2(target.y - me.y, target.x - me.x);
                const bRef = push(ref(db, 'bullets'));
                set(bRef, { owner: myId, x: me.x, y: me.y, vx: Math.cos(angle)*15, vy: Math.sin(angle)*15, life: 50 });
                setTimeout(() => remove(bRef), 1000); // Hapus peluru dari database setelah 1 detik
                lastFireTime = Date.now();
            }
        }

        // SISTEM MATI & ZONA
        function checkStatus() {
            const me = players[myId];
            if(!me || !me.isAlive) return;

            // 1. Cek HP
            if(me.hp <= 0) {
                handleDeath(me.lastKiller || "THE ZONE");
                return;
            }

            // 2. Cek Zona (White Circle)
            const distToCenter = Math.hypot(me.x - zone.x, me.y - zone.y);
            if(distToCenter > zone.radius) {
                document.getElementById("zone-warning").style.display = "block";
                if(Date.now() % 1000 < 50) { // Damage per detik
                    update(ref(db, 'players/' + myId), { hp: Math.max(0, me.hp - 10) });
                }
            } else {
                document.getElementById("zone-warning").style.display = "none";
            }
        }

        function handleDeath(killerName) {
            update(ref(db, 'players/' + myId), { isAlive: false, deaths: increment(1) });
            document.getElementById("death-screen").style.display = "flex";
            document.getElementById("killed-by").innerText = "KILLED BY: " + killerName;
            
            let count = 5;
            const itv = setInterval(() => {
                count--;
                document.getElementById("respawn-timer").innerText = count;
                if(count <= 0) { clearInterval(itv); respawn(); }
            }, 1000);
        }

        function respawn() {
            update(ref(db, 'players/' + myId), { isAlive: true, hp: 100, x: zone.x, y: zone.y, lastKiller: "" });
            document.getElementById("death-screen").style.display = "none";
        }

        // LOOP UTAMA
        function loop() {
            const me = players[myId];
            if (me && me.isAlive) {
                let dx = 0, dy = 0;
                if (keys['w']) dy -= 7; if (keys['s']) dy += 7;
                if (keys['a']) dx -= 7; if (keys['d']) dx += 7;
                if (joystick.active) { dx += joystick.moveX * 7; dy += joystick.moveY * 7; }
                if (dx !== 0 || dy !== 0) update(ref(db, 'players/' + myId), { x: me.x + dx, y: me.y + dy });
                
                camera.x = me.x - canvas.width / 2;
                camera.y = me.y - canvas.height / 2;
                checkStatus();
                
                // Cek peluru yang mengenai KITA (Hanya cek peluru milik orang lain)
                Object.entries(globalBullets).forEach(([id, b]) => {
                    if(b.owner !== myId && Math.hypot(me.x - b.x, me.y - b.y) < 30) {
                        const newHp = Math.max(0, me.hp - 32);
                        update(ref(db, 'players/' + myId), { hp: newHp, lastKiller: players[b.owner]?.name || "Enemy" });
                        if(newHp <= 0) update(ref(db, 'players/' + b.owner), { kills: increment(1) });
                        remove(ref(db, 'bullets/' + id));
                    }
                });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Gambar Zona Putih
            ctx.beginPath(); ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI*2);
            ctx.strokeStyle = "white"; ctx.lineWidth = 5; ctx.stroke();

            // Gambar Semua Player
            Object.values(players).forEach(p => {
                if(!p.isAlive) return;
                // Health Bar Realistis
                ctx.fillStyle = "#333"; ctx.fillRect(p.x - 30, p.y - 45, 60, 8);
                ctx.fillStyle = p.hp > 30 ? "#00f3ff" : "red";
                ctx.fillRect(p.x - 30, p.y - 45, (p.hp/100)*60, 8);
                // Body
                ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                // Name
                ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.font = "bold 12px Orbitron";
                ctx.fillText(p.name, p.x - 25, p.y - 55);
            });

            // Gambar Peluru Global
            Object.values(globalBullets).forEach(b => {
                ctx.fillStyle = "yellow"; ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
                // Update posisi peluru secara visual (lokal agar smooth)
                b.x += b.vx; b.y += b.vy;
            });

            ctx.restore();
            if(myId && players[myId]) {
                document.getElementById("hud-score").innerText = `KILLS: ${players[myId].kills} | DEATHS: ${players[myId].deaths} | HP: ${players[myId].hp}`;
            }
            requestAnimationFrame(loop);
        }

        // Kontrol & Event
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); fire(); });
        window.addEventListener("mousedown", () => { if(canvas.style.display === "block") fire(); });

        // Joystick Logic
        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");
        jContainer.addEventListener("touchstart", () => joystick.active = true);
        window.addEventListener("touchmove", (e) => {
            if(!joystick.active) return;
            const t = e.touches[0]; const r = jContainer.getBoundingClientRect();
            const dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.hypot(dx, dy), ratio = d > 60 ? 60/d : 1;
            joystick.moveX = (dx*ratio)/60; joystick.moveY = (dy*ratio)/60;
            jStick.style.transform = `translate(calc(-50% + ${dx*ratio}px), calc(-50% + ${dy*ratio}px))`;
        });
        window.addEventListener("touchend", () => { joystick.active = false; joystick.moveX = 0; joystick.moveY = 0; jStick.style.transform = `translate(-50%, -50%)`; });

        document.getElementById("start-btn").onclick = () => {
            let s = 3; document.getElementById("start-btn").innerText = s;
            const t = setInterval(() => {
                s--; document.getElementById("start-btn").innerText = s;
                if(s <= 0) {
                    clearInterval(t);
                    document.getElementById("ui-lobby").style.display = "none";
                    document.getElementById("hud").style.display = "block";
                    document.getElementById("joystick-container").style.display = "block";
                    document.getElementById("fire-btn").style.display = "flex";
                    canvas.style.display = "block";
                    requestAnimationFrame(loop);
                }
            }, 1000);
        };
        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    </script>
</body>
</html>
