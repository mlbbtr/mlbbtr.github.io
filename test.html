```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiraAudio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* animated glow background */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#3b82f6,#0000);
filter:blur(120px);
animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
from{transform:translate(-200px,-100px)}
to{transform:translate(200px,100px)}
}

.container{
text-align:center;
z-index:2;
position:relative;
padding:20px;
}

/* logo */

.logo{
font-size:54px;
font-weight:800;
letter-spacing:2px;

background:linear-gradient(90deg,#22c1ff,#6f8cff,#22c1ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradient 6s linear infinite;
}

@keyframes gradient{
to{background-position:200%}
}

.version{
margin-top:5px;
opacity:.6;
}

/* equalizer */

.equalizer{
display:flex;
gap:6px;
justify-content:center;
margin-top:25px;
}

.bar{
width:6px;
height:22px;
background:#3b82f6;
border-radius:4px;
animation:beat 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes beat{
0%,100%{height:20px}
50%{height:45px}
}

/* wait text */

.wait{
margin-top:22px;
font-size:15px;
opacity:.8;
}

/* button */

button{
margin-top:25px;
padding:14px 38px;

font-size:16px;
font-weight:500;

border:none;
border-radius:12px;

background:#334155;
color:#aaa;

cursor:not-allowed;
transition:.3s;
}

button.active{
background:linear-gradient(90deg,#3b82f6,#22c1ff);
color:white;
cursor:pointer;
transform:scale(1.05);
box-shadow:0 0 20px rgba(59,130,246,.6);
}

button.active:hover{
transform:scale(1.1);
}

/* responsive */

@media(max-width:600px){

.logo{
font-size:36px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">MiraAudio</div>
<div class="version">Welcome • v1.0</div>

<div class="equalizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="wait">
Please wait <span id="count">5</span> seconds
</div>

<button id="continueBtn" disabled>Continue</button>

</div>

<audio id="welcomeAudio" preload="auto">
<source src="https://audio.jukehost.co.uk/22z0kp56nmEaZgdWYOvvmbBy0NJjMGBd.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("welcomeAudio");
audio.volume = 0.15;

/* autoplay fix */

function startAudio(){

audio.play().catch(()=>{});

document.removeEventListener("click",startAudio);

}

window.addEventListener("load",()=>{
audio.play().catch(()=>{});
});

document.addEventListener("click",startAudio);

/* countdown */

let time = 5;

const count = document.getElementById("count");
const btn = document.getElementById("continueBtn");

const timer = setInterval(()=>{

time--;

count.textContent = time;

if(time <= 0){

clearInterval(timer);

btn.disabled = false;
btn.classList.add("active");

}

},1000);

/* continue */

btn.onclick = ()=>{

window.location.href = "index.html";

};

</script>

</body>
</html>
