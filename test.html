<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTDROP — YouTube to MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060608;
      --surface: #0d0d10;
      --card: #13131a;
      --border: #1e1e2a;
      --accent: #ff3c5f;
      --accent2: #ff8c42;
      --text: #f0eeff;
      --muted: #6b6b80;
      --success: #2fffb4;
      --glow: rgba(255, 60, 95, 0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Animated grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,60,95,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,60,95,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      from { transform: translateY(0); }
      to { transform: translateY(60px); }
    }

    /* Radial glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,60,95,0.12), transparent 70%);
      top: -100px; left: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,140,66,0.08), transparent 70%);
      bottom: -50px; right: -50px;
      animation-delay: -4s;
    }
    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Layout */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeSlideDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(255,60,95,0.15), rgba(255,140,66,0.1));
      border: 1px solid rgba(255,60,95,0.3);
      border-radius: 100px;
      padding: 6px 16px 6px 10px;
      margin-bottom: 24px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #fff 0%, #ff3c5f 50%, #ff8c42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,60,95,0.6), transparent);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .url-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px var(--glow);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--glow);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-download {
      background: rgba(47,255,180,0.1);
      color: var(--success);
      border: 1px solid rgba(47,255,180,0.3);
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-download:hover {
      background: rgba(47,255,180,0.18);
      transform: translateY(-1px);
    }

    /* Format pills */
    .format-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .format-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: block;
    }

    .pill {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill.active {
      background: rgba(255,60,95,0.12);
      border-color: rgba(255,60,95,0.5);
      color: var(--accent);
    }
    .pill:hover:not(.active) {
      border-color: var(--muted);
      color: var(--text);
    }

    /* Status area */
    #status-area { margin-top: 4px; }

    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 0 8px;
    }
    .loader.show { display: flex; }

    .spinner-track {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Result card */
    .result {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-top: 8px;
      animation: fadeSlideUp 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .result.show { display: block; }

    .result-meta {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .result-thumb {
      width: 80px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 100px;
      height: 4px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--glow);
    }

    /* Error */
    .error-box {
      display: none;
      background: rgba(255,60,95,0.08);
      border: 1px solid rgba(255,60,95,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--accent);
      animation: fadeSlideUp 0.3s ease;
    }
    .error-box.show { display: block; }

    /* Stats strip */
    .stats {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-top: 32px;
      width: 100%;
      max-width: 640px;
      animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }
    .stat {
      flex: 1;
      padding: 18px;
      text-align: center;
      background: var(--card);
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Footer */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    }

    /* Animations */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Paste button hint */
    .paste-hint {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,60,95,0.15);
      color: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 10px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }
    .input-wrap { position: relative; flex: 1; min-width: 200px; }
    .input-wrap .url-input { width: 100%; padding-right: 60px; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo-badge">
        <span class="dot"></span>
        Free MP3 Converter
      </div>
      <h1>YTDROP</h1>
      <p class="tagline">// paste link. pick format. grab audio.</p>
    </header>

    <div class="card">
      <span class="format-label">Format Output</span>
      <div class="format-row" id="formatRow">
        <button class="pill active" data-fmt="mp3">MP3</button>
        <button class="pill" data-fmt="mp4">MP4</button>
        <button class="pill" data-fmt="webm">WEBM</button>
        <button class="pill" data-fmt="m4a">M4A</button>
      </div>

      <div class="input-group">
        <div class="input-wrap">
          <input
            class="url-input"
            id="urlInput"
            type="url"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="paste-hint" id="pasteBtn">PASTE</button>
        </div>
        <button class="btn btn-primary" id="fetchBtn">CONVERT →</button>
      </div>

      <div id="status-area">
        <div class="loader" id="loader">
          <div class="spinner-track"></div>
          <span class="loader-text" id="loaderText">FETCHING DATA...</span>
        </div>

        <div class="result" id="result">
          <div class="result-meta">
            <img class="result-thumb" id="resultThumb" src="" alt="thumbnail" />
            <div class="result-info">
              <div class="result-title" id="resultTitle">—</div>
              <div class="result-sub" id="resultSub">—</div>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <button class="btn btn-download" id="downloadBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            DOWNLOAD FILE
          </button>
        </div>

        <div class="error-box" id="errorBox"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">No Limit</div>
      </div>
      <div class="stat">
        <div class="stat-num">0₿</div>
        <div class="stat-label">Free</div>
      </div>
      <div class="stat">
        <div class="stat-num">320k</div>
        <div class="stat-label">Max Quality</div>
      </div>
    </div>

    <footer>YTDROP &nbsp;·&nbsp; no ads &nbsp;·&nbsp; no signup &nbsp;·&nbsp; just music</footer>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    const result = document.getElementById('result');
    const errorBox = document.getElementById('errorBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultSub = document.getElementById('resultSub');
    const resultThumb = document.getElementById('resultThumb');
    const progressBar = document.getElementById('progressBar');
    const downloadBtn = document.getElementById('downloadBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const formatRow = document.getElementById('formatRow');

    let selectedFormat = 'mp3';
    let downloadUrl = '';

    // Format selector
    formatRow.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        formatRow.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        selectedFormat = pill.dataset.fmt;
      });
    });

    // Paste button
    pasteBtn.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
        urlInput.focus();
      } catch {
        urlInput.focus();
      }
    });

    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
        /youtube\.com\/shorts\/([^&\n?#]+)/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    function setProgress(pct) { progressBar.style.width = pct + '%'; }

    function hideAll() {
      loader.classList.remove('show');
      result.classList.remove('show');
      errorBox.classList.remove('show');
    }

    function showError(msg) {
      hideAll();
      errorBox.textContent = '⚠ ' + msg;
      errorBox.classList.add('show');
      fetchBtn.disabled = false;
    }

    async function startConvert() {
      const url = urlInput.value.trim();
      if (!url) { urlInput.focus(); return; }

      const videoId = extractVideoId(url);
      if (!videoId) {
        showError('URL YouTube tidak valid. Pastikan formatnya benar.');
        return;
      }

      hideAll();
      downloadUrl = '';
      fetchBtn.disabled = true;
      loader.classList.add('show');
      setProgress(0);

      const thumbUrl = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
      resultThumb.src = thumbUrl;
      resultTitle.textContent = 'Memproses video...';
      resultSub.textContent = `Format: ${selectedFormat.toUpperCase()} · ID: ${videoId}`;

      loaderText.textContent = 'MENGHUBUNGI SERVER...';
      setProgress(15);

      // Cobalt.tools - open source, CORS-friendly, support YouTube
      const isAudio = ['mp3', 'm4a'].includes(selectedFormat);
      const body = {
        url: url,
        downloadMode: isAudio ? 'audio' : 'auto',
        ...(isAudio && { audioFormat: 'mp3', audioBitrate: '320' }),
        ...(!isAudio && { videoQuality: '1080' }),
      };

      try {
        loaderText.textContent = 'MENGAMBIL LINK...';
        setProgress(35);

        const resp = await fetch('https://api.cobalt.tools', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body)
        });

        setProgress(65);
        loaderText.textContent = 'MEMPROSES...';

        const data = await resp.json();
        console.log('Cobalt response:', data);

        if (data.status === 'error') {
          const code = data?.error?.code || 'unknown';
          throw new Error(`API Error: ${code}`);
        }

        const link = data?.url || data?.picker?.[0]?.url || null;
        if (!link) throw new Error('Link tidak ditemukan. Coba URL lain.');

        downloadUrl = link;
        const fname = data?.filename || '';
        resultTitle.textContent = fname.replace(/\.[^.]+$/, '') || `YouTube · ${videoId}`;
        resultSub.textContent = `Format: ${selectedFormat.toUpperCase()} · Siap diunduh`;

        setProgress(100);
        setTimeout(() => {
          hideAll();
          result.classList.add('show');
          fetchBtn.disabled = false;
        }, 300);

      } catch (err) {
        console.error('Error:', err);
        showError(err.message || 'Gagal menghubungi server. Coba lagi.');
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!downloadUrl) return;
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = '';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    fetchBtn.addEventListener('click', startConvert);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') startConvert(); });

    urlInput.addEventListener('paste', () => {
      setTimeout(() => {
        if (urlInput.value.includes('youtube.com') || urlInput.value.includes('youtu.be')) {
          urlInput.style.borderColor = 'var(--accent)';
          setTimeout(() => { urlInput.style.borderColor = ''; }, 1000);
        }
      }, 50);
    });
  </script>
</body>
</html>
