<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        
        .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #death-screen { display: none; background: rgba(100, 0, 0, 0.85); z-index: 200; }
        
        #hud { position: fixed; top: 10px; left: 10px; z-index: 50; display: none; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-left: 4px solid var(--neon-blue); margin-bottom: 5px; font-size: 14px; border-radius: 0 10px 10px 0; }

        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon-blue); border-radius: 50%; display: none; z-index: 60; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-blue); }
        #fire-btn { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,0,255,0.4), rgba(255,0,255,0.05)); border: 4px solid var(--neon-pink); border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 60; font-weight: bold; }
        #fire-btn:active { transform: scale(0.9); background: rgba(255,0,255,0.6); }

        canvas { display: none; background: #050505; }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1>EXECURIVE ARENA</h1>
        <button class="btn-main" id="login-btn" style="padding:15px 30px; background:var(--neon-blue); border:none; font-family:'Orbitron'; cursor:pointer;">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2>LOBBY</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button id="start-btn" style="padding:15px 30px; background:var(--neon-pink); border:none; color:white; font-family:'Orbitron'; cursor:pointer;">START MATCH (3s)</button>
    </div>

    <div id="death-screen" class="overlay">
        <h1 style="color:white; font-size: 50px;">WASTED</h1>
        <p id="killed-by">KILLED BY: ENEMY</p>
        <p id="respawn-timer" style="color:yellow">RESPAWNING IN 5...</p>
    </div>

    <div id="hud">
        <div class="stat-box" id="hud-name">PLAYER</div>
        <div class="stat-box" id="hud-score">KILLS: 0 | DEATHS: 0</div>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null, players = {}, bullets = [], joystick = { active: false, moveX: 0, moveY: 0 };
        let camera = { x: 0, y: 0 }, keys = {}, lastFireTime = 0;
        const FIRE_RANGE = 350;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                document.getElementById("hud-name").innerText = user.displayName;
                
                const pRef = ref(db, 'players/' + myId);
                set(pRef, { id: myId, name: user.displayName, x: 500, y: 500, color: '#00f3ff', hp: 100, kills: 0, deaths: 0, isAlive: true });
                onDisconnect(pRef).remove();
            }
        });

        onValue(ref(db, 'players'), (snap) => { 
            players = snap.val() || {}; 
            if(myId && players[myId]) {
                document.getElementById("hud-score").innerText = `KILLS: ${players[myId].kills} | DEATHS: ${players[myId].deaths}`;
            }
        });

        // AUTO-LOCK FIRE LOGIC
        function fire() {
            const me = players[myId];
            if (!me || !me.isAlive || Date.now() - lastFireTime < 1000) return;

            let target = null, minDist = FIRE_RANGE;
            Object.values(players).forEach(p => {
                if(p.id !== myId && p.isAlive) {
                    let d = Math.hypot(p.x - me.x, p.y - me.y);
                    if(d < minDist) { minDist = d; target = p; }
                }
            });

            if(target) {
                const angle = Math.atan2(target.y - me.y, target.x - me.x);
                bullets.push({ x: me.x, y: me.y, vx: Math.cos(angle)*15, vy: Math.sin(angle)*15, owner: myId, life: 60 });
                lastFireTime = Date.now();
            }
        }

        function handleDeath(killerName) {
            update(ref(db, 'players/' + myId), { isAlive: false, deaths: increment(1), hp: 0 });
            document.getElementById("death-screen").style.display = "flex";
            document.getElementById("killed-by").innerText = "KILLED BY: " + killerName;
            
            let count = 5;
            const itv = setInterval(() => {
                count--;
                document.getElementById("respawn-timer").innerText = "RESPAWNING IN " + count + "...";
                if(count <= 0) { clearInterval(itv); respawn(); }
            }, 1000);
        }

        function respawn() {
            update(ref(db, 'players/' + myId), { isAlive: true, hp: 100, x: Math.random()*800, y: Math.random()*800 });
            document.getElementById("death-screen").style.display = "none";
        }

        // CONTROLS
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); fire(); });
        window.addEventListener("mousedown", () => { if(canvas.style.display === "block") fire(); });

        // JOYSTICK
        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");
        jContainer.addEventListener("touchstart", () => joystick.active = true);
        window.addEventListener("touchmove", (e) => {
            if(!joystick.active) return;
            const t = e.touches[0]; const r = jContainer.getBoundingClientRect();
            const dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.hypot(dx, dy), ratio = d > 60 ? 60/d : 1;
            joystick.moveX = (dx*ratio)/60; joystick.moveY = (dy*ratio)/60;
            jStick.style.transform = `translate(calc(-50% + ${dx*ratio}px), calc(-50% + ${dy*ratio}px))`;
        });
        window.addEventListener("touchend", () => { joystick.active = false; joystick.moveX = 0; joystick.moveY = 0; jStick.style.transform = `translate(-50%, -50%)`; });

        // MAIN LOOP
        function loop() {
            const me = players[myId];
            if (me && me.isAlive) {
                let dx = 0, dy = 0;
                if (keys['w']) dy -= 7; if (keys['s']) dy += 7;
                if (keys['a']) dx -= 7; if (keys['d']) dx += 7;
                if (joystick.active) { dx += joystick.moveX * 7; dy += joystick.moveY * 7; }
                
                if (dx !== 0 || dy !== 0) {
                    update(ref(db, 'players/' + myId), { x: me.x + dx, y: me.y + dy });
                }
                camera.x = me.x - canvas.width / 2;
                camera.y = me.y - canvas.height / 2;
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; b.life--;
                Object.values(players).forEach(p => {
                    if(p.id !== b.owner && p.isAlive && Math.hypot(p.x - b.x, p.y - b.y) < 25) {
                        if(p.id === myId) handleDeath(players[b.owner]?.name || "Enemy");
                        if(b.owner === myId) {
                            const newHp = Math.max(0, (p.hp || 100) - 32);
                            update(ref(db, 'players/' + p.id), { hp: newHp });
                            if(newHp <= 0) update(ref(db, 'players/' + myId), { kills: increment(1) });
                        }
                        bullets.splice(i, 1);
                    }
                });
                if(b.life <= 0) bullets.splice(i, 1);
            });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // GRID MAP
            ctx.strokeStyle = "#111";
            for(let i=0; i<2000; i+=100) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, 2000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(2000, i); ctx.stroke();
            }

            // DRAW PLAYERS
            Object.values(players).forEach(p => {
                if(!p.isAlive) return;
                // Range Circle (Hanya untuk Player Kita)
                if(p.id === myId) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, FIRE_RANGE, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(0, 243, 255, 0.1)"; ctx.stroke();
                }
                // HP BAR
                ctx.fillStyle = "#333"; ctx.fillRect(p.x - 25, p.y - 40, 50, 5);
                ctx.fillStyle = (p.hp || 100) > 30 ? "var(--neon-blue)" : "red";
                ctx.fillRect(p.x - 25, p.y - 40, ((p.hp || 100)/100)*50, 5);
                // BODY
                ctx.fillStyle = p.color; ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                // NAME
                ctx.fillStyle = "white"; ctx.font = "10px Orbitron"; ctx.fillText(p.name, p.x - 20, p.y - 45);
            });

            bullets.forEach(b => { ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
            ctx.restore();
            requestAnimationFrame(loop);
        }

        document.getElementById("start-btn").onclick = () => {
            let s = 3; document.getElementById("start-btn").innerText = s;
            const t = setInterval(() => {
                s--; document.getElementById("start-btn").innerText = s;
                if(s <= 0) {
                    clearInterval(t);
                    document.getElementById("ui-lobby").style.display = "none";
                    document.getElementById("hud").style.display = "block";
                    document.getElementById("joystick-container").style.display = "block";
                    document.getElementById("fire-btn").style.display = "flex";
                    canvas.style.display = "block";
                    requestAnimationFrame(loop);
                }
            }, 1000);
        };
        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    </script>
</body>
</html>
