<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; }
        * { box-sizing: border-box; touch-action: none; } /* Mencegah zoom/scroll saat main */
        
        body { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; font-family: 'Orbitron', sans-serif; 
            width: 100vw; height: 100vh;
        }

        /* Overlay UI */
        .overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }

        #game-canvas { display: block; background: #050505; }

        /* Style Analog/Joystick */
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 50%; display: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: var(--neon-blue);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Tombol Tembak Mobile */
        #fire-btn {
            position: absolute; bottom: 60px; right: 50px;
            width: 80px; height: 80px;
            background: rgba(255, 0, 255, 0.3);
            border: 3px solid var(--neon-pink);
            border-radius: 50%; display: none;
            justify-content: center; align-items: center;
            color: white; font-weight: bold;
        }

        .btn-main {
            padding: 15px 40px; background: var(--neon-blue);
            border: none; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; margin-top: 20px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1>EXECURIVE ARENA</h1>
        <button class="btn-main" id="login-btn">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2>LOBBY SERVER</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button class="btn-main" style="background:var(--neon-pink)" id="start-btn">DEPLOY</button>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null;
        let players = {};
        let joystick = { active: false, x: 0, y: 0, moveX: 0, moveY: 0 };

        // Resize Canvas Full Screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. AUTH LOGIC
        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                
                const pRef = ref(db, 'players/' + myId);
                set(pRef, { id: myId, name: user.displayName, x: 100, y: 100, color: '#00f3ff' });
                onDisconnect(pRef).remove();
            }
        });

        onValue(ref(db, 'players'), (snap) => {
            players = snap.val() || {};
            document.getElementById("player-list").innerHTML = Object.values(players).map(p => `<div>${p.name}</div>`).join("");
        });

        // 2. ANALOG LOGIC (Touch Events)
        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");

        jContainer.addEventListener("touchstart", (e) => {
            joystick.active = true;
        });

        window.addEventListener("touchmove", (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            const rect = jContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Hitung jarak geser
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = rect.width / 2;

            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }

            // Gerakkan visual stick analog
            jStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            // Simpan nilai pergerakan (-1 sampai 1)
            joystick.moveX = dx / maxDist;
            joystick.moveY = dy / maxDist;
        });

        window.addEventListener("touchend", () => {
            joystick.active = false;
            joystick.moveX = 0; joystick.moveY = 0;
            jStick.style.transform = `translate(-50%, -50%)`;
        });

        // 3. GAME LOOP
        function loop() {
            if (myId && players[myId] && joystick.active) {
                let me = players[myId];
                me.x += joystick.moveX * 5;
                me.y += joystick.moveY * 5;
                
                // Update posisi ke Firebase (dibatasi agar tidak lag)
                update(ref(db, 'players/' + myId), { x: me.x, y: me.y });
            }

            // Drawing
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            Object.values(players).forEach(p => {
                ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                ctx.fillStyle = "white";
                ctx.fillText(p.name, p.x - 20, p.y - 25);
            });

            requestAnimationFrame(loop);
        }

        // 4. CONTROL ACTION
        document.getElementById("start-btn").onclick = () => {
            document.getElementById("ui-lobby").style.display = "none";
            jContainer.style.display = "block";
            document.getElementById("fire-btn").style.display = "flex";
            loop();
        };

        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);

    </script>
</body>
</html>
