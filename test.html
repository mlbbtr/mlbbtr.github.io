<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECURIVE ARENA - Hexky AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-red: #ff3131; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        
        /* Layar Utama & Death Screen */
        .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #death-screen { display: none; background: rgba(139, 0, 0, 0.9); z-index: 200; text-align: center; border: 10px solid var(--neon-red); }
        
        /* HUD Stats */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 50; display: none; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 12px; border-left: 5px solid var(--neon-blue); margin-bottom: 8px; border-radius: 0 15px 15px 0; box-shadow: 0 0 10px rgba(0,243,255,0.3); }
        #zone-alert { color: var(--neon-red); font-weight: bold; font-size: 18px; display: none; animation: blink 0.5s infinite; text-shadow: 0 0 10px red; }

        /* Mobile Controls */
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon-blue); border-radius: 50%; display: none; z-index: 60; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 55px; height: 55px; background: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px var(--neon-blue); }
        #fire-btn { position: absolute; bottom: 60px; right: 50px; width: 110px; height: 110px; background: radial-gradient(circle, rgba(255,0,255,0.5), rgba(255,0,255,0.1)); border: 5px solid var(--neon-pink); border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 60; font-weight: bold; cursor: pointer; transition: 0.1s; }
        #fire-btn:active { transform: scale(0.8); background: rgba(255,0,255,0.7); box-shadow: 0 0 30px var(--neon-pink); }
        
        canvas { display: none; background: #050505; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-auth" class="overlay">
        <h1 style="letter-spacing: 5px;">EXECURIVE ARENA</h1>
        <button id="login-btn" style="padding:15px 40px; background:var(--neon-blue); border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer; border-radius: 5px;">AUTH LOGIN</button>
    </div>

    <div id="ui-lobby" class="overlay" style="display:none">
        <h2 style="color:var(--neon-pink)">LOBBY SERVER</h2>
        <div id="player-list" style="margin: 20px 0; background:rgba(255,255,255,0.1); padding:20px; border-radius:10px; min-width:250px;"></div>
        <button id="start-btn" style="padding:15px 40px; background:var(--neon-pink); border:none; color:white; font-family:'Orbitron'; font-weight:bold; cursor:pointer; border-radius:5px;">DEPLOY (3s)</button>
    </div>

    <div id="death-screen" class="overlay">
        <h1 style="font-size: 80px; margin: 0; color: white; text-shadow: 5px 5px #000;">WASTED</h1>
        <p id="killed-by" style="font-size: 24px; color: #fff;">KILLED BY: PLAYER</p>
        <p style="font-size: 18px;">Respawn In:</p>
        <h2 id="respawn-timer" style="color:yellow; font-size: 40px;">5</h2>
    </div>

    <div id="hud">
        <div class="stat-box" id="hud-name">NAME</div>
        <div class="stat-box" id="hud-score">K: 0 | D: 0 | HP: 100</div>
        <div id="zone-alert">OUTSIDE SAFE ZONE!</div>
    </div>

    <div id="joystick-container"><div id="joystick-stick"></div></div>
    <div id="fire-btn">FIRE</div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, increment, push, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl4ei8kfMaBoQEokFE5FlkPvz-NdEhQXw",
            authDomain: "exeai-eefc8.firebaseapp.com",
            databaseURL: "https://exeai-eefc8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "exeai-eefc8",
            storageBucket: "exeai-eefc8.firebasestorage.app",
            messagingSenderId: "1013428002517",
            appId: "1:1013428002517:web:6e3e07a810167c97bb8c5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let myId = null, players = {}, globalBullets = {}, joystick = { active: false, moveX: 0, moveY: 0 };
        let camera = { x: 0, y: 0 }, keys = {}, lastFireTime = 0, lastZoneDamage = 0;
        const FIRE_RANGE = 350; // Jarak Auto-Lock
        const SAFE_ZONE = { x: 1000, y: 1000, radius: 900 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myId = user.uid;
                document.getElementById("ui-auth").style.display = "none";
                document.getElementById("ui-lobby").style.display = "flex";
                document.getElementById("hud-name").innerText = user.displayName;
                
                const pRef = ref(db, 'players/' + myId);
                set(pRef, { id: myId, name: user.displayName, x: 1000, y: 1000, color: '#00f3ff', hp: 100, kills: 0, deaths: 0, isAlive: true, lastKiller: "THE ZONE" });
                onDisconnect(pRef).remove();
            }
        });

        onValue(ref(db, 'players'), (s) => { players = s.val() || {}; });
        onValue(ref(db, 'bullets'), (s) => { globalBullets = s.val() || {}; });

        // SISTEM TEMBAK AUTO-LOCK (FULL FITUR)
        function fire() {
            const me = players[myId];
            if (!me || !me.isAlive || Date.now() - lastFireTime < 1000) return;

            let target = null, minDist = FIRE_RANGE;
            Object.values(players).forEach(p => {
                if(p.id !== myId && p.isAlive) {
                    let d = Math.hypot(p.x - me.x, p.y - me.y);
                    if(d < minDist) { minDist = d; target = p; }
                }
            });

            if(target) {
                const angle = Math.atan2(target.y - me.y, target.x - me.x);
                const bRef = push(ref(db, 'bullets'));
                set(bRef, { owner: myId, x: me.x, y: me.y, vx: Math.cos(angle)*16, vy: Math.sin(angle)*16, life: 60 });
                setTimeout(() => remove(bRef), 1200);
                lastFireTime = Date.now();
            }
        }

        function handleDeath(killer) {
            update(ref(db, 'players/' + myId), { isAlive: false, deaths: increment(1), hp: 0 });
            document.getElementById("death-screen").style.display = "flex";
            document.getElementById("killed-by").innerText = "KILLED BY: " + killer;
            
            let count = 5;
            const itv = setInterval(() => {
                count--;
                document.getElementById("respawn-timer").innerText = count;
                if(count <= 0) { clearInterval(itv); respawn(); }
            }, 1000);
        }

        function respawn() {
            update(ref(db, 'players/' + myId), { isAlive: true, hp: 100, x: 1000, y: 1000, lastKiller: "THE ZONE" });
            document.getElementById("death-screen").style.display = "none";
        }

        // KEYBOARD & TOUCH
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); fire(); });
        window.addEventListener("mousedown", () => { if(canvas.style.display === "block") fire(); });

        // MAIN GAME LOOP
        function loop() {
            const me = players[myId];
            if (me && me.isAlive) {
                // Movement Logic
                let dx = 0, dy = 0;
                if (keys['w']) dy -= 7; if (keys['s']) dy += 7;
                if (keys['a']) dx -= 7; if (keys['d']) dx += 7;
                if (joystick.active) { dx += joystick.moveX * 7; dy += joystick.moveY * 7; }
                if (dx !== 0 || dy !== 0) update(ref(db, 'players/' + myId), { x: me.x + dx, y: me.y + dy });
                
                camera.x = me.x - canvas.width / 2;
                camera.y = me.y - canvas.height / 2;

                // 1. Logika Zona Putih (Damage Fix)
                const distToCenter = Math.hypot(me.x - SAFE_ZONE.x, me.y - SAFE_ZONE.y);
                if(distToCenter > SAFE_ZONE.radius) {
                    document.getElementById("zone-alert").style.display = "block";
                    if(Date.now() - lastZoneDamage > 1000) { // Fix Damage per detik
                        update(ref(db, 'players/' + myId), { hp: Math.max(0, me.hp - 10) });
                        lastZoneDamage = Date.now();
                    }
                } else {
                    document.getElementById("zone-alert").style.display = "none";
                }

                // 2. Logika Kematian (HP 0)
                if(me.hp <= 0) handleDeath(me.lastKiller || "THE ZONE");

                // 3. Logika Peluru Kena Kita
                Object.entries(globalBullets).forEach(([id, b]) => {
                    if(b.owner !== myId && Math.hypot(me.x - b.x, me.y - b.y) < 25) {
                        const newHp = Math.max(0, me.hp - 32);
                        update(ref(db, 'players/' + myId), { hp: newHp, lastKiller: players[b.owner]?.name || "Enemy" });
                        if(newHp <= 0) update(ref(db, 'players/' + b.owner), { kills: increment(1) });
                        remove(ref(db, 'bullets/' + id));
                    }
                });
            }

            // RENDERING
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Draw Zona Putih
            ctx.beginPath(); ctx.arc(SAFE_ZONE.x, SAFE_ZONE.y, SAFE_ZONE.radius, 0, Math.PI*2);
            ctx.strokeStyle = "white"; ctx.lineWidth = 10; ctx.stroke();

            // Draw Players & UI Lokal
            Object.values(players).forEach(p => {
                if(!p.isAlive) return;
                // Auto-Lock Range (Hanya tampil di diri sendiri)
                if(p.id === myId) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, FIRE_RANGE, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(0, 243, 255, 0.1)"; ctx.lineWidth = 2; ctx.stroke();
                }
                // Health Bar (Fix: Selalu muncul)
                ctx.fillStyle = "#222"; ctx.fillRect(p.x - 30, p.y - 45, 60, 8);
                ctx.fillStyle = (p.hp > 30) ? varName('--neon-blue') : varName('--neon-red');
                ctx.fillRect(p.x - 30, p.y - 45, (Math.max(0, p.hp)/100)*60, 8);
                // Box Body
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.fillStyle = p.color; ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                // Name Tag
                ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.font = "bold 12px Orbitron";
                ctx.fillText(p.name, p.x - 25, p.y - 55);
            });

            // Draw Global Bullets
            Object.values(globalBullets).forEach(b => {
                ctx.fillStyle = "yellow"; ctx.beginPath();
                ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
                b.x += b.vx; b.y += b.vy; // Smooth visual movement
            });

            ctx.restore();
            if(myId && players[myId]) {
                document.getElementById("hud-score").innerText = `K: ${players[myId].kills} | D: ${players[myId].deaths} | HP: ${players[myId].hp}`;
            }
            requestAnimationFrame(loop);
        }

        function varName(n) { return getComputedStyle(document.documentElement).getPropertyValue(n); }

        // JOYSTICK LOGIC
        const jContainer = document.getElementById("joystick-container");
        const jStick = document.getElementById("joystick-stick");
        jContainer.addEventListener("touchstart", () => joystick.active = true);
        window.addEventListener("touchmove", (e) => {
            if(!joystick.active) return;
            const t = e.touches[0]; const r = jContainer.getBoundingClientRect();
            const dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
            const d = Math.hypot(dx, dy), ratio = d > 65 ? 65/d : 1;
            joystick.moveX = (dx*ratio)/65; joystick.moveY = (dy*ratio)/65;
            jStick.style.transform = `translate(calc(-50% + ${dx*ratio}px), calc(-50% + ${dy*ratio}px))`;
        });
        window.addEventListener("touchend", () => { joystick.active = false; joystick.moveX = 0; joystick.moveY = 0; jStick.style.transform = `translate(-50%, -50%)`; });

        // START GAME
        document.getElementById("start-btn").onclick = () => {
            let s = 3; document.getElementById("start-btn").innerText = s;
            const t = setInterval(() => {
                s--; document.getElementById("start-btn").innerText = s;
                if(s <= 0) {
                    clearInterval(t);
                    document.getElementById("ui-lobby").style.display = "none";
                    document.getElementById("hud").style.display = "block";
                    document.getElementById("joystick-container").style.display = "block";
                    document.getElementById("fire-btn").style.display = "flex";
                    canvas.style.display = "block";
                    requestAnimationFrame(loop);
                }
            }, 1000);
        };
        document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    </script>
</body>
</html>
