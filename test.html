<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>YT to MP3 by Hengki</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
    }
    #result {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>YT to MP3<br>by Hengki</h2>

  <input type="text" id="url" placeholder="Masukkan link YouTube...">
  <br>

  <button onclick="convert()">Download MP3</button>

  <div id="result"></div>

<script>
async function convert() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = "Masukkan link dulu!";
    return;
  }

  result.innerHTML = "Processing... ⏳";

  try {
    const response = await fetch(
      "https://youtube-mp310.p.rapidapi.com/download/mp3?url=" + encodeURIComponent(url),
      {
        method: "GET",
        headers: {
          "x-rapidapi-key": "7b17bf3ab4mshb72cf086f868e75p1087cejsnb980948f364d",
          "x-rapidapi-host": "youtube-mp310.p.rapidapi.com"
        }
      }
    );

    const data = await response.json();

    if (data.download_url) {
      result.innerHTML = `
        <p>${data.title || "Ready!"}</p>
        <a href="${data.download_url}" target="_blank">Download MP3</a>
      `;
    } else {
      result.innerHTML = "Gagal convert ❌";
    }

  } catch (err) {
    result.innerHTML = "Error / kena CORS ❌";
  }
}
</script>

</body>
</html>
