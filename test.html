<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Tracker — Miya Main</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oxanium:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #f5c842;
    --gold2: #e8a020;
    --cyan: #00e5ff;
    --cyan2: #0097a7;
    --red: #ff3d57;
    --green: #00e676;
    --bg: #07090f;
    --bg2: #0d1120;
    --bg3: #111828;
    --border: rgba(245,200,66,0.15);
    --border2: rgba(0,229,255,0.12);
    --text: #e8eaf0;
    --muted: #6b7a99;
    --card: rgba(13,17,32,0.95);
    --glow-gold: 0 0 20px rgba(245,200,66,0.3);
    --glow-cyan: 0 0 20px rgba(0,229,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,200,66,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,229,255,0.04) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7,9,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 16px;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
    color: #07090f;
    font-family: 'Orbitron', sans-serif;
    box-shadow: var(--glow-gold);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--gold);
    line-height: 1.1;
    letter-spacing: 1px;
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 400;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-mmr {
    display: flex; align-items: center; gap: 8px;
    background: rgba(245,200,66,0.08);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-mmr:hover {
    background: rgba(245,200,66,0.14);
    border-color: rgba(245,200,66,0.3);
    box-shadow: var(--glow-gold);
  }

  .mmr-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Oxanium', sans-serif;
  }

  .mmr-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--gold);
  }

  .mmr-edit-btn {
    width: 24px; height: 24px;
    background: rgba(245,200,66,0.15);
    border: none; border-radius: 5px;
    color: var(--gold); font-size: 12px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .mmr-edit-btn:hover { background: rgba(245,200,66,0.3); }

  /* MMR INPUT INLINE */
  .mmr-input {
    background: transparent;
    border: none; outline: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--gold);
    width: 90px;
    text-align: right;
  }

  /* HERO FILTER & SEARCH */
  .toolbar {
    max-width: 1400px; margin: 0 auto;
    padding: 20px 24px 0;
    display: flex; gap: 12px; flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    position: relative; flex: 1; min-width: 200px; max-width: 360px;
  }

  .search-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 500;
    color: var(--text);
    outline: none; transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: var(--cyan2);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  .search-box .icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 16px;
  }

  .filter-btns {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--muted);
    font-family: 'Oxanium', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--cyan2);
    color: var(--cyan);
  }

  .filter-btn.win-f.active {
    background: rgba(0,230,118,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  /* STATS BAR */
  .stats-bar {
    max-width: 1400px; margin: 16px auto 0;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.2s;
  }

  .stat-card:hover {
    border-color: rgba(245,200,66,0.3);
    box-shadow: var(--glow-gold);
  }

  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .stat-icon.gold { background: rgba(245,200,66,0.15); }
  .stat-icon.green { background: rgba(0,230,118,0.15); }
  .stat-icon.red { background: rgba(255,61,87,0.15); }
  .stat-icon.cyan { background: rgba(0,229,255,0.15); }

  .stat-info .label {
    font-size: 11px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
    font-family: 'Oxanium', sans-serif;
  }

  .stat-info .value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px; font-weight: 700;
    line-height: 1.2; margin-top: 2px;
  }

  .stat-info .value.gold { color: var(--gold); }
  .stat-info .value.green { color: var(--green); }
  .stat-info .value.red { color: var(--red); }
  .stat-info .value.cyan { color: var(--cyan); }

  /* MAIN GRID */
  main {
    max-width: 1400px; margin: 20px auto 40px;
    padding: 0 24px;
    position: relative; z-index: 1;
  }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; margin-top: 8px;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* HERO CARD */
  .hero-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.25s;
    position: relative;
    cursor: default;
  }

  .hero-card:hover {
    border-color: rgba(245,200,66,0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), var(--glow-gold);
  }

  .hero-card.main-hero {
    border-color: rgba(245,200,66,0.4);
    background: linear-gradient(135deg, rgba(245,200,66,0.05), var(--card));
  }

  .hero-card.main-hero::before {
    content: '★ MAIN';
    position: absolute; top: 10px; right: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #07090f;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; font-weight: 900;
    padding: 3px 8px; border-radius: 4px;
    letter-spacing: 1px; z-index: 2;
  }

  .card-top {
    padding: 16px 16px 12px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .hero-avatar {
    width: 48px; height: 48px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--bg3), var(--bg2));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    position: relative; overflow: hidden;
  }

  .hero-avatar img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 9px;
  }

  .hero-info { flex: 1; min-width: 0; }

  .hero-name {
    font-family: 'Oxanium', sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--text);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }

  .hero-role {
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
    font-family: 'Rajdhani', sans-serif;
  }

  .hero-wr {
    text-align: right; flex-shrink: 0;
  }

  .wr-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
    line-height: 1;
  }

  .wr-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
    margin-top: 2px; font-family: 'Rajdhani', sans-serif;
  }

  /* WIN/LOSE COUNTER AREA */
  .card-body {
    padding: 14px 16px;
  }

  .wl-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }

  .counter-box {
    background: var(--bg2);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .counter-box.win-box {
    border-color: rgba(0,230,118,0.15);
  }

  .counter-box.lose-box {
    border-color: rgba(255,61,87,0.15);
  }

  .counter-box:hover {
    background: var(--bg3);
  }

  .counter-left { display: flex; align-items: center; gap: 8px; }

  .counter-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .win-box .counter-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .lose-box .counter-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .counter-label {
    font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    font-family: 'Oxanium', sans-serif;
  }

  .counter-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px; font-weight: 700;
  }

  .win-box .counter-num { color: var(--green); }
  .lose-box .counter-num { color: var(--red); }

  /* BUTTONS */
  .counter-btns {
    display: flex; align-items: center; gap: 4px;
  }

  .btn-counter {
    width: 28px; height: 28px;
    border: none; border-radius: 7px;
    cursor: pointer; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: 'Orbitron', sans-serif;
    line-height: 1;
  }

  .btn-win-add { background: rgba(0,230,118,0.15); color: var(--green); }
  .btn-win-add:hover { background: rgba(0,230,118,0.3); transform: scale(1.1); }

  .btn-lose-add { background: rgba(255,61,87,0.15); color: var(--red); }
  .btn-lose-add:hover { background: rgba(255,61,87,0.3); transform: scale(1.1); }

  .btn-sub { background: rgba(255,255,255,0.06); color: var(--muted); }
  .btn-sub:hover { background: rgba(255,255,255,0.12); color: var(--text); transform: scale(1.1); }

  /* WIN RATE BAR */
  .wr-bar-wrap {
    margin-top: 2px;
  }

  .wr-bar-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    margin-bottom: 5px;
  }

  .wr-bar-track {
    height: 6px; border-radius: 10px;
    background: rgba(255,61,87,0.3);
    overflow: hidden; position: relative;
  }

  .wr-bar-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--green), #00bfa5);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  .wr-bar-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 6px;
    background: rgba(255,255,255,0.5);
    filter: blur(2px);
  }

  /* TOTAL GAMES PILL */
  .games-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--cyan);
    font-family: 'Oxanium', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 10px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    padding: 20px;
  }

  .modal-overlay.active {
    opacity: 1; pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%; max-width: 420px;
    transform: scale(0.95) translateY(10px);
    transition: transform 0.2s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), var(--glow-gold);
  }

  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  .modal-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--gold); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .modal-field { margin-bottom: 14px; }

  .modal-field label {
    display: block; font-size: 12px;
    color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
    font-family: 'Oxanium', sans-serif;
  }

  .modal-field input, .modal-field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600;
    color: var(--text); outline: none;
    transition: border-color 0.2s;
  }

  .modal-field input:focus, .modal-field select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
  }

  .modal-field select option { background: var(--bg3); }

  .modal-actions {
    display: flex; gap: 10px; margin-top: 20px;
  }

  .btn-primary {
    flex: 1; padding: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #07090f; border: none;
    border-radius: 10px; cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-primary:hover {
    filter: brightness(1.1);
    box-shadow: var(--glow-gold);
  }

  .btn-secondary {
    flex: 1; padding: 12px;
    background: rgba(255,255,255,0.05);
    color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }

  .btn-danger {
    padding: 12px 16px;
    background: rgba(255,61,87,0.1);
    color: var(--red); border: 1px solid rgba(255,61,87,0.2);
    border-radius: 10px; cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-size: 12px; font-weight: 700;
    transition: all 0.2s;
  }

  .btn-danger:hover {
    background: rgba(255,61,87,0.2);
    box-shadow: 0 0 12px rgba(255,61,87,0.2);
  }

  /* ADD HERO FAB */
  .fab {
    position: fixed; bottom: 28px; right: 28px; z-index: 90;
    width: 58px; height: 58px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none; border-radius: 50%;
    cursor: pointer; font-size: 26px; font-weight: 700;
    color: #07090f;
    box-shadow: var(--glow-gold), 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .fab:hover {
    transform: scale(1.1) rotate(90deg);
    box-shadow: 0 0 30px rgba(245,200,66,0.5), 0 6px 24px rgba(0,0,0,0.5);
  }

  /* TOAST */
  .toast-wrap {
    position: fixed; top: 80px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }

  .toast {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-family: 'Oxanium', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    display: flex; align-items: center; gap: 8px;
  }

  .toast.success { border-color: rgba(0,230,118,0.3); }
  .toast.error { border-color: rgba(255,61,87,0.3); }

  @keyframes toastIn {
    from { opacity:0; transform: translateX(20px); }
    to { opacity:1; transform: translateX(0); }
  }

  @keyframes toastOut {
    from { opacity:1; transform: translateX(0); }
    to { opacity:0; transform: translateX(20px); }
  }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    transition: opacity 0.5s;
  }

  .loading-screen.hide { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px; font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .loading-bar {
    width: 200px; height: 3px;
    background: var(--bg3);
    border-radius: 10px; overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--cyan));
    border-radius: 10px;
    animation: loadFill 1.5s ease forwards;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes loadFill {
    to { width: 100%; }
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .empty-text {
    font-family: 'Oxanium', sans-serif;
    font-size: 15px; letter-spacing: 1px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header-inner { padding: 0; }
    header { padding: 0 16px; }
    .toolbar { padding: 16px 16px 0; }
    .stats-bar { padding: 0 16px; grid-template-columns: 1fr 1fr; }
    main { padding: 0 16px; }
    .hero-grid { grid-template-columns: 1fr; }
    .logo-text { font-size: 13px; }
    .mmr-value { font-size: 15px; }
    .fab { bottom: 20px; right: 20px; width: 52px; height: 52px; font-size: 22px; }
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { padding: 10px 12px; }
    .stat-info .value { font-size: 16px; }
    .filter-btns { gap: 4px; }
    .filter-btn { font-size: 11px; padding: 6px 10px; }
  }

  /* Card entrance animation */
  .hero-card {
    animation: cardIn 0.4s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HERO CARD EDIT ACTIONS */
  .card-actions {
    display: flex; gap: 6px;
    padding: 0 16px 14px;
  }

  .btn-edit-card {
    flex: 1; padding: 7px;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 8px; cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-size: 11px; font-weight: 600;
    color: var(--cyan); letter-spacing: 0.5px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-edit-card:hover {
    background: rgba(0,229,255,0.14);
    border-color: var(--cyan2);
  }

  .btn-del-card {
    padding: 7px 12px;
    background: rgba(255,61,87,0.07);
    border: 1px solid rgba(255,61,87,0.12);
    border-radius: 8px; cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-size: 11px; font-weight: 600;
    color: var(--red);
    transition: all 0.2s;
  }

  .btn-del-card:hover {
    background: rgba(255,61,87,0.18);
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">MLBB TRACKER</div>
  <div style="color:var(--muted);font-family:'Oxanium';font-size:12px;letter-spacing:3px">CONNECTING TO DATABASE...</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">ML</div>
      <div>
        <div class="logo-text">MLBB TRACKER</div>
        <div class="logo-sub">Hero Stats</div>
      </div>
    </div>
    <div class="header-mmr" id="mmrDisplay" onclick="enableMMREdit()">
      <div>
        <div class="mmr-label">MMR</div>
        <div class="mmr-value" id="mmrVal">—</div>
      </div>
      <button class="mmr-edit-btn" title="Edit MMR">✎</button>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari hero..." oninput="filterHeroes()">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-role="all" onclick="setRole(this,'all')">All</button>
    <button class="filter-btn" data-role="Marksman" onclick="setRole(this,'Marksman')">Marksman</button>
    <button class="filter-btn" data-role="Assassin" onclick="setRole(this,'Assassin')">Assassin</button>
    <button class="filter-btn" data-role="Mage" onclick="setRole(this,'Mage')">Mage</button>
    <button class="filter-btn" data-role="Tank" onclick="setRole(this,'Tank')">Tank</button>
    <button class="filter-btn" data-role="Fighter" onclick="setRole(this,'Fighter')">Fighter</button>
    <button class="filter-btn" data-role="Support" onclick="setRole(this,'Support')">Support</button>
    <button class="filter-btn win-f" data-role="win" onclick="setRole(this,'win')">🏆 Winrate ≥60%</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card">
    <div class="stat-icon gold">🎮</div>
    <div class="stat-info">
      <div class="label">Total Games</div>
      <div class="value gold" id="statTotal">0</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green">🏆</div>
    <div class="stat-info">
      <div class="label">Total Win</div>
      <div class="value green" id="statWin">0</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon red">💀</div>
    <div class="stat-info">
      <div class="label">Total Lose</div>
      <div class="value red" id="statLose">0</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon cyan">📊</div>
    <div class="stat-info">
      <div class="label">Overall WR</div>
      <div class="value cyan" id="statWR">0%</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="section-header">
    <span class="section-title">Hero List</span>
    <div class="section-line"></div>
    <span style="font-size:12px;color:var(--muted);font-family:'Oxanium';" id="heroCount">0 heroes</span>
  </div>
  <div class="hero-grid" id="heroGrid">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⚔️</div>
      <div class="empty-text">Belum ada hero. Tekan + untuk menambah.</div>
    </div>
  </div>
</main>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="Tambah Hero">+</button>

<!-- TOAST AREA -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="heroModal">
  <div class="modal">
    <div class="modal-title">⚔️ <span id="modalTitle">Tambah Hero</span></div>
    <input type="hidden" id="editHeroId">
    <div class="modal-field">
      <label>Nama Hero</label>
      <input type="text" id="heroNameInput" placeholder="cth: Miya, Layla, Tigreal...">
    </div>
    <div class="modal-field">
      <label>Role</label>
      <select id="heroRoleInput">
        <option value="Marksman">🏹 Marksman</option>
        <option value="Assassin">🗡️ Assassin</option>
        <option value="Mage">🔮 Mage</option>
        <option value="Tank">🛡️ Tank</option>
        <option value="Fighter">⚔️ Fighter</option>
        <option value="Support">💊 Support</option>
      </select>
    </div>
    <div class="wl-row">
      <div class="modal-field" style="margin:0">
        <label>Win</label>
        <input type="number" id="heroWinInput" placeholder="0" min="0" value="0">
      </div>
      <div class="modal-field" style="margin:0">
        <label>Lose</label>
        <input type="number" id="heroLoseInput" placeholder="0" min="0" value="0">
      </div>
    </div>
    <div class="modal-field">
      <label>Main Hero?</label>
      <select id="heroMainInput">
        <option value="false">Bukan Main</option>
        <option value="true">★ Main Hero</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn-danger" id="deleteBtn" onclick="deleteHero()" style="display:none">Hapus</button>
      <button class="btn-primary" onclick="saveHero()">Simpan</button>
    </div>
  </div>
</div>

<!-- MMR EDIT MODAL -->
<div class="modal-overlay" id="mmrModal">
  <div class="modal">
    <div class="modal-title">🏅 Edit MMR</div>
    <div class="modal-field">
      <label>MMR Saat Ini</label>
      <input type="number" id="mmrInput" placeholder="cth: 1050" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeMMR()">Batal</button>
      <button class="btn-primary" onclick="saveMMR()">Simpan</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBZs-qSS8Zj7wLs_TdUyYb03xviy81ew_Y",
    authDomain: "winlose-mlbb.firebaseapp.com",
    projectId: "winlose-mlbb",
    storageBucket: "winlose-mlbb.firebasestorage.app",
    messagingSenderId: "584562860632",
    appId: "1:584562860632:web:b0b22c23a7871781c8202d",
    measurementId: "G-XZ60XPGWQ3",
    databaseURL: "https://winlose-mlbb-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let heroesData = {};
  let currentRole = 'all';
  let currentSearch = '';

  const ROLE_EMOJI = {
    Marksman: '🏹', Assassin: '🗡️', Mage: '🔮',
    Tank: '🛡️', Fighter: '⚔️', Support: '💊'
  };

  // ── REALTIME LISTENERS ──
  onValue(ref(db, 'heroes'), snap => {
    heroesData = snap.val() || {};
    renderHeroes();
    updateStats();
  });

  onValue(ref(db, 'mmr'), snap => {
    const v = snap.val();
    document.getElementById('mmrVal').textContent = v !== null ? v : '—';
  });

  // ── TOAST ──
  window.showToast = (msg, type='success') => {
    const w = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = (type==='success'?'✅':'❌') + ' ' + msg;
    w.appendChild(t);
    setTimeout(() => t.remove(), 2700);
  };

  // ── RENDER ──
  function renderHeroes() {
    const grid = document.getElementById('heroGrid');
    const empty = document.getElementById('emptyState');
    const countEl = document.getElementById('heroCount');

    let entries = Object.entries(heroesData);

    // Sort: main first, then alphabetical
    entries.sort((a,b) => {
      if (b[1].main && !a[1].main) return 1;
      if (a[1].main && !b[1].main) return -1;
      return a[1].name.localeCompare(b[1].name);
    });

    // Filter
    if (currentRole !== 'all' && currentRole !== 'win') {
      entries = entries.filter(([,h]) => h.role === currentRole);
    } else if (currentRole === 'win') {
      entries = entries.filter(([,h]) => {
        const total = (h.win||0)+(h.lose||0);
        return total > 0 && (h.win||0)/total >= 0.6;
      });
    }

    if (currentSearch) {
      entries = entries.filter(([,h]) => h.name.toLowerCase().includes(currentSearch.toLowerCase()));
    }

    // Clear old cards (keep empty state)
    [...grid.querySelectorAll('.hero-card')].forEach(c => c.remove());

    countEl.textContent = `${entries.length} hero${entries.length!==1?'s':''}`;

    if (entries.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    entries.forEach(([id, h], i) => {
      const win = h.win || 0;
      const lose = h.lose || 0;
      const total = win + lose;
      const wr = total > 0 ? Math.round(win / total * 100) : 0;
      const wrColor = wr >= 60 ? 'var(--green)' : wr >= 50 ? 'var(--gold)' : 'var(--red)';
      const emoji = ROLE_EMOJI[h.role] || '⚔️';

      const card = document.createElement('div');
      card.className = `hero-card${h.main ? ' main-hero' : ''}`;
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <div class="card-top">
          <div class="hero-avatar">${emoji}</div>
          <div class="hero-info">
            <div class="hero-name">${escHtml(h.name)}</div>
            <div class="hero-role">${h.role || 'Unknown'}</div>
          </div>
          <div class="hero-wr">
            <div class="wr-value" style="color:${wrColor}">${wr}%</div>
            <div class="wr-label">Win Rate</div>
          </div>
        </div>
        <div class="card-body">
          <div class="wl-row">
            <div class="counter-box win-box">
              <div class="counter-left">
                <div class="counter-dot"></div>
                <span class="counter-label">Win</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="counter-btns">
                  <button class="btn-counter btn-sub" onclick="changeCount('${id}','win',-1)">−</button>
                </div>
                <div class="counter-num">${win}</div>
                <div class="counter-btns">
                  <button class="btn-counter btn-win-add" onclick="changeCount('${id}','win',1)">+</button>
                </div>
              </div>
            </div>
            <div class="counter-box lose-box">
              <div class="counter-left">
                <div class="counter-dot"></div>
                <span class="counter-label">Lose</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="counter-btns">
                  <button class="btn-counter btn-sub" onclick="changeCount('${id}','lose',-1)">−</button>
                </div>
                <div class="counter-num">${lose}</div>
                <div class="counter-btns">
                  <button class="btn-counter btn-lose-add" onclick="changeCount('${id}','lose',1)">+</button>
                </div>
              </div>
            </div>
          </div>
          <div class="wr-bar-wrap">
            <div class="wr-bar-labels">
              <span>Win ${win}</span>
              <span>${total} games</span>
              <span>Lose ${lose}</span>
            </div>
            <div class="wr-bar-track">
              <div class="wr-bar-fill" style="width:${wr}%"></div>
            </div>
          </div>
          <div class="games-pill">🎮 ${total} total games played</div>
        </div>
        <div class="card-actions">
          <button class="btn-edit-card" onclick="openEditModal('${id}')">✎ Edit</button>
          <button class="btn-del-card" onclick="confirmDelete('${id}')">🗑</button>
        </div>
      `;
      grid.appendChild(card);
    });

    // Hide loading
    const ls = document.getElementById('loadingScreen');
    if (ls) { ls.classList.add('hide'); setTimeout(()=>ls.remove(),600); }
  }

  function updateStats() {
    const vals = Object.values(heroesData);
    const totalW = vals.reduce((s,h)=>s+(h.win||0),0);
    const totalL = vals.reduce((s,h)=>s+(h.lose||0),0);
    const total = totalW + totalL;
    const wr = total > 0 ? Math.round(totalW/total*100) : 0;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statWin').textContent = totalW;
    document.getElementById('statLose').textContent = totalL;
    document.getElementById('statWR').textContent = wr + '%';
  }

  // ── COUNTER ──
  window.changeCount = (id, field, delta) => {
    const h = heroesData[id];
    if (!h) return;
    const cur = h[field] || 0;
    const next = Math.max(0, cur + delta);
    update(ref(db, `heroes/${id}`), { [field]: next });
  };

  // ── FILTER ──
  window.setRole = (btn, role) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = role;
    renderHeroes();
  };

  window.filterHeroes = () => {
    currentSearch = document.getElementById('searchInput').value;
    renderHeroes();
  };

  // ── ADD HERO MODAL ──
  window.openAddModal = () => {
    document.getElementById('modalTitle').textContent = 'Tambah Hero';
    document.getElementById('editHeroId').value = '';
    document.getElementById('heroNameInput').value = '';
    document.getElementById('heroRoleInput').value = 'Marksman';
    document.getElementById('heroWinInput').value = '0';
    document.getElementById('heroLoseInput').value = '0';
    document.getElementById('heroMainInput').value = 'false';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('heroModal').classList.add('active');
    setTimeout(()=>document.getElementById('heroNameInput').focus(), 200);
  };

  window.openEditModal = (id) => {
    const h = heroesData[id];
    if (!h) return;
    document.getElementById('modalTitle').textContent = 'Edit Hero';
    document.getElementById('editHeroId').value = id;
    document.getElementById('heroNameInput').value = h.name;
    document.getElementById('heroRoleInput').value = h.role || 'Marksman';
    document.getElementById('heroWinInput').value = h.win || 0;
    document.getElementById('heroLoseInput').value = h.lose || 0;
    document.getElementById('heroMainInput').value = h.main ? 'true' : 'false';
    document.getElementById('deleteBtn').style.display = 'block';
    document.getElementById('heroModal').classList.add('active');
  };

  window.closeModal = () => document.getElementById('heroModal').classList.remove('active');

  window.saveHero = () => {
    const name = document.getElementById('heroNameInput').value.trim();
    const role = document.getElementById('heroRoleInput').value;
    const win = parseInt(document.getElementById('heroWinInput').value) || 0;
    const lose = parseInt(document.getElementById('heroLoseInput').value) || 0;
    const main = document.getElementById('heroMainInput').value === 'true';
    const editId = document.getElementById('editHeroId').value;

    if (!name) { showToast('Nama hero tidak boleh kosong', 'error'); return; }

    const data = { name, role, win, lose, main };

    if (editId) {
      update(ref(db, `heroes/${editId}`), data)
        .then(() => { showToast(`${name} berhasil diupdate!`); closeModal(); })
        .catch(() => showToast('Gagal update', 'error'));
    } else {
      push(ref(db, 'heroes'), data)
        .then(() => { showToast(`${name} berhasil ditambahkan! 🎉`); closeModal(); })
        .catch(() => showToast('Gagal menyimpan', 'error'));
    }
  };

  window.confirmDelete = (id) => {
    openEditModal(id);
  };

  window.deleteHero = () => {
    const id = document.getElementById('editHeroId').value;
    if (!id) return;
    const name = heroesData[id]?.name || 'Hero';
    remove(ref(db, `heroes/${id}`))
      .then(() => { showToast(`${name} dihapus`); closeModal(); })
      .catch(() => showToast('Gagal menghapus', 'error'));
  };

  // ── MMR ──
  window.enableMMREdit = () => {
    const cur = document.getElementById('mmrVal').textContent;
    document.getElementById('mmrInput').value = cur === '—' ? '' : cur;
    document.getElementById('mmrModal').classList.add('active');
    setTimeout(()=>document.getElementById('mmrInput').focus(), 200);
  };

  window.closeMMR = () => document.getElementById('mmrModal').classList.remove('active');

  window.saveMMR = () => {
    const v = parseInt(document.getElementById('mmrInput').value);
    if (isNaN(v) || v < 0) { showToast('MMR tidak valid', 'error'); return; }
    set(ref(db, 'mmr'), v)
      .then(() => { showToast(`MMR diperbarui: ${v} 🏅`); closeMMR(); })
      .catch(() => showToast('Gagal update MMR', 'error'));
  };

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => {
      if (e.target === m) { m.classList.remove('active'); }
    });
  });

  // Enter key on inputs
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    }
  });

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Seed default heroes if DB is empty after 3 seconds
  setTimeout(async () => {
    if (Object.keys(heroesData).length === 0) {
      const defaults = [
        { name: 'Miya', role: 'Marksman', win: 0, lose: 0, main: true },
        { name: 'Layla', role: 'Marksman', win: 0, lose: 0, main: false },
        { name: 'Tigreal', role: 'Tank', win: 0, lose: 0, main: false },
        { name: 'Alucard', role: 'Fighter', win: 0, lose: 0, main: false },
        { name: 'Eudora', role: 'Mage', win: 0, lose: 0, main: false },
        { name: 'Natalia', role: 'Assassin', win: 0, lose: 0, main: false },
        { name: 'Estes', role: 'Support', win: 0, lose: 0, main: false },
        { name: 'Balmond', role: 'Fighter', win: 0, lose: 0, main: false },
      ];
      for (const h of defaults) {
        await push(ref(db, 'heroes'), h);
      }
    }
    const ls = document.getElementById('loadingScreen');
    if (ls) { ls.classList.add('hide'); setTimeout(()=>ls.remove(),600); }
  }, 3000);
</script>
</body>
</html>
