<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT to MP3/MP4 by Hengki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 360px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .mp3 { background: #22c55e; }
    .mp4 { background: #3b82f6; }
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
    a {
      display: block;
      margin-top: 10px;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>YT to MP3/MP4<br>by Hengki</h2>
    <input type="text" id="url" placeholder="Masukkan link YouTube...">
    <br>
    <button class="mp3" onclick="convert('mp3')">MP3</button>
    <button class="mp4" onclick="convert('mp4')">MP4</button>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    async function convert(type) {
      const url = document.getElementById('url').value;
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      if (!url) {
        status.innerHTML = "Masukkan link dulu!";
        return;
      }

      status.innerHTML = "Processing... ⏳";
      result.innerHTML = "";

      try {
        const res = await fetch("https://co.wuk.sh/api/json", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            url: url,
            vCodec: type === "mp3" ? "none" : "h264",
            vQuality: "720",
            aFormat: type === "mp3" ? "mp3" : "mp4"
          })
        });

        const data = await res.json();

        if (data.url) {
          status.innerHTML = "Selesai ✅";
          result.innerHTML = `<a href="${data.url}" target="_blank">Download ${type.toUpperCase()}</a>`;
        } else {
          status.innerHTML = "Gagal ❌";
        }

      } catch (e) {
        status.innerHTML = "Server error ❌";
      }
    }
  </script>
</body>
</html>
