<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ExeMusic - YouTube Audio Player</title>

<style>

body{
background:#0f0f0f;
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:15px;
width:400px;
max-width:90%;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
}

h1{
margin-bottom:20px;
font-size:22px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2b2b2b;
color:white;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ff3355;
}

audio{
width:100%;
margin-top:20px;
}

.info{
margin-top:10px;
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>ExeMusic YT Player</h1>

<input id="yturl" placeholder="Paste YouTube Link">

<button onclick="convert()">Play Audio</button>

<audio id="player" controls></audio>

<div class="info">
Paste YouTube link lalu play untuk memutar audio
</div>

</div>

<script>

function getID(url){

let regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
let match = url.match(regExp);

return match ? match[1] : null;

}

function convert(){

let url = document.getElementById("yturl").value;
let id = getID(url);

if(!id){

alert("Link YouTube tidak valid");
return;

}

let audioURL = "https://yewtu.be/latest_version?id=" + id + "&itag=140";

let player = document.getElementById("player");

player.src = audioURL;
player.play();

}

</script>

</body>
</html>
