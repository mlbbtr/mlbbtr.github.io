<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeMusic Navbar Simulation</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(20, 20, 20, 0.95);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  z-index: 1000;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img,
.logo video {
  width: 40px;
  height: 40px;
  object-fit: contain;
}

.logo span {
  font-size: 20px;
  font-weight: bold;
  background: linear-gradient(90deg, #00ffcc, #ff4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* MENU */
.menu {
  display: flex;
  gap: 20px;
}

.menu a {
  color: #ccc;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.menu a:hover {
  color: #fff;
}

/* CONTENT SIMULASI */
.content {
  padding-top: 100px;
  text-align: center;
}

.card {
  margin: 20px auto;
  width: 300px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  
  <div class="logo">
    
    <!-- PILIH SALAH SATU -->

    <!-- GIF -->
    <img src="logo.gif" alt="logo">

    <!-- ATAU VIDEO (RECOMMENDED) -->
    <!--
    <video autoplay loop muted playsinline>
      <source src="logo.mp4" type="video/mp4">
    </video>
    -->

    <span>ExeMusic</span>
  </div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Trending</a>
    <a href="#">Library</a>
    <a href="#">Search</a>
  </div>

</div>

<!-- CONTENT -->
<div class="content">
  <h1>ExeMusic Simulation</h1>

  <div class="card">🎧 Lagu 1</div>
  <div class="card">🔥 Trending</div>
  <div class="card">💿 Playlist</div>
</div>

</body>
</html>
