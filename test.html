<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT to MP3/MP4 by Hengki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 350px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .mp3 { background: #22c55e; }
    .mp4 { background: #3b82f6; }
    iframe {
      margin-top: 20px;
      width: 100%;
      height: 60px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YT to MP3/MP4<br>by Hengki</h1>
    <input type="text" id="url" placeholder="Masukkan link YouTube...">
    <br>
    <button class="mp3" onclick="convert('mp3')">Convert to MP3</button>
    <button class="mp4" onclick="convert('mp4')">Convert to MP4</button>
    <div id="result"></div>
  </div>

  <script>
    function getVideoId(url) {
      const regExp = /(?:youtube\.com\/(?:.*v=|.*\/)|youtu\.be\/)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[1].length === 11) ? match[1] : null;
    }

    function convert(type) {
      const url = document.getElementById('url').value;
      const videoId = getVideoId(url);
      const result = document.getElementById('result');

      if (!videoId) {
        result.innerHTML = '<p style="color:red;">Link tidak valid!</p>';
        return;
      }

      result.innerHTML = `<iframe src="https://yt-api.org/button/${type}/${videoId}"></iframe>`;
    }
  </script>
</body>
</html>
