<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeMedia Gallery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:40px; }
.container { width:90%; max-width:900px; background:#1e293b; border-radius:15px; padding:20px; box-shadow:0 0 30px rgba(0,0,0,0.6); }
h1 { text-align:center; margin-bottom:20px; }

.upload { display:flex; gap:10px; margin-bottom:20px; align-items:center; }
.upload input[type=file] { display:none; }
.upload label { display:flex; align-items:center; justify-content:center; width:50px; height:50px; background:#22c55e; border-radius:50%; cursor:pointer; font-size:28px; font-weight:bold; }
.upload label:hover { opacity:0.8; }

#gallery { display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap:15px; }
.item { background:#334155; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.item img, .item video { width:100%; border-bottom:1px solid #1e293b; max-height:150px; object-fit:cover; }
.item .title { padding:5px; text-align:center; font-size:14px; }
.item .actions { display:flex; gap:5px; margin:5px; }
.item .actions button { padding:5px 8px; font-size:12px; border:none; border-radius:5px; cursor:pointer; background:#22c55e; color:white; }
.item .actions button:hover { opacity:0.8; }

#playerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column; z-index:1000; }
#playerModal video, #playerModal audio { max-width:80%; max-height:60%; margin-bottom:10px; background:#000; }
#playerModal .controls { display:flex; gap:10px; margin-top:10px; align-items:center; }
#playerModal .controls input[type=range] { width:150px; }
#playerModal button { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; background:#22c55e; color:white; }
#playerModal button:hover { opacity:0.8; }
#playerModal .close { position:absolute; top:20px; right:20px; font-size:25px; cursor:pointer; color:white; }
</style>
</head>
<body>

<div class="container">

<h1>ExeMedia Gallery</h1>

<!-- Upload -->
<div class="upload">
<label for="fileInput">+</label>
<input type="file" id="fileInput" multiple accept="audio/*,video/*,image/*">
</div>

<!-- Gallery -->
<div id="gallery"></div>

</div>

<!-- Player Modal -->
<div id="playerModal">
<span class="close" onclick="closePlayer()">×</span>
<video id="videoPlayer" controls></video>
<audio id="audioPlayer" controls></audio>
<div class="controls">
<button onclick="prevMedia()">Prev</button>
<button onclick="playMedia()">Play</button>
<button onclick="pauseMedia()">Pause</button>
<button onclick="nextMedia()">Next</button>
Volume: <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
</div>
</div>

<script>
const supabaseUrl = "https://hikzgjseckxanetyxqkc.supabase.co";
const supabaseKey = "sb_publishable_lRARo_osK1IOcIDegeW-jA_9k39aCto";
const sb = supabase.createClient(supabaseUrl, supabaseKey);

let mediaList = [];
let currentIndex = 0;
let currentType = "audio";

const gallery = document.getElementById("gallery");
const fileInput = document.getElementById("fileInput");
const playerModal = document.getElementById("playerModal");
const videoPlayer = document.getElementById("videoPlayer");
const audioPlayer = document.getElementById("audioPlayer");

/* Load Media */
async function loadMedia(){
  const {data,error} = await sb.storage.from("music").list();
  if(error) { console.log(error); return; }
  gallery.innerHTML="";
  mediaList=[];
  data.forEach((file,i)=>{
    const url = supabaseUrl+"/storage/v1/object/public/music/"+file.name;
    const type = file.name.match(/\.(mp3|wav|ogg)$/i) ? "audio" :
                 file.name.match(/\.(mp4|webm|mov)$/i) ? "video" : "image";
    mediaList.push({url,type,name:file.name});
    const div = document.createElement("div");
    div.className="item";
    if(type=="image") div.innerHTML=`<img src="${url}"><div class="title">${file.name}</div>`;
    else if(type=="video") div.innerHTML=`<video src="${url}" muted></video><div class="title">${file.name}</div>`;
    else div.innerHTML=`<div class="title">${file.name}</div>`;
    const actions = document.createElement("div");
    actions.className="actions";
    actions.innerHTML = `<button onclick="playItem(${i})">Play</button>
                         <button onclick="downloadItem('${url}')">Download</button>
                         <button onclick="deleteItem('${file.name}')">Delete</button>`;
    div.appendChild(actions);
    gallery.appendChild(div);
  });
}

/* Upload */
fileInput.addEventListener("change", async ()=>{
  const files = Array.from(fileInput.files);
  for(const file of files){
    const fileName=Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9.]/g,"_");
    const {error} = await sb.storage.from("music").upload(fileName,file);
    if(error) { console.log(error); alert("Upload failed"); continue; }
  }
  loadMedia();
});

/* Player */
function playItem(index){
  currentIndex=index;
  const media = mediaList[index];
  currentType=media.type;
  if(media.type=="video"){
    videoPlayer.src=media.url; videoPlayer.style.display="block";
    audioPlayer.style.display="none";
  } else if(media.type=="audio"){
    audioPlayer.src=media.url; audioPlayer.style.display="block";
    videoPlayer.style.display="none";
  } else { videoPlayer.style.display="none"; audioPlayer.style.display="none"; return; }
  playerModal.style.display="flex";
  if(currentType=="audio") audioPlayer.play();
  else videoPlayer.play();
}

function closePlayer(){
  if(currentType=="audio") audioPlayer.pause();
  else videoPlayer.pause();
  playerModal.style.display="none";
}

function playMedia(){ if(currentType=="audio") audioPlayer.play(); else videoPlayer.play(); }
function pauseMedia(){ if(currentType=="audio") audioPlayer.pause(); else videoPlayer.pause(); }
function prevMedia(){ currentIndex=(currentIndex-1+mediaList.length)%mediaList.length; playItem(currentIndex); }
function nextMedia(){ currentIndex=(currentIndex+1)%mediaList.length; playItem(currentIndex); }
function setVolume(val){ if(currentType=="audio") audioPlayer.volume=val; else videoPlayer.volume=val; }

/* Download */
function downloadItem(url){
  const a=document.createElement("a");
  a.href=url; a.download=""; a.click();
}

/* Delete */
async function deleteItem(fileName){
  if(!confirm("Delete this file?")) return;
  const {error}=await sb.storage.from("music").remove([fileName]);
  if(error) { alert("Delete failed"); console.log(error); return; }
  loadMedia();
}

/* Initial Load */
loadMedia();
</script>

</body>
</html>
